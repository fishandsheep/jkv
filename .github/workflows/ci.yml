name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cross-build:
    name: cross-build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Cross compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -o "jkv-${GOOS}-${GOARCH}" ./cmd/jkv

  native-unix:
    name: native ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
          - runner: macos-15
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify native runner
        run: |
          test "$(go env GOOS)" = "${{ matrix.goos }}"
          test "$(go env GOARCH)" = "${{ matrix.goarch }}"
      - name: Test and vet
        run: |
          go test ./...
          go vet ./...
      - name: Build and execute
        run: |
          go build -trimpath -o jkv-ci ./cmd/jkv
          ./jkv-ci version
      - name: Run Unix installer
        env:
          HOME: ${{ runner.temp }}/jkv-home
          JKV_DIR: ${{ runner.temp }}/jkv-install
          SHELL: /bin/bash
        run: |
          mkdir -p "$HOME"
          sh ./install.sh
          "$JKV_DIR/bin/jkv" version
          grep -F '# jkv init' "$HOME/.bashrc"

  native-windows:
    name: native windows/${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            goarch: amd64
          - runner: windows-11-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Verify native runner
        shell: pwsh
        run: |
          if ((go env GOOS) -ne 'windows') { throw "expected windows, got $(go env GOOS)" }
          if ((go env GOARCH) -ne '${{ matrix.goarch }}') { throw "expected ${{ matrix.goarch }}, got $(go env GOARCH)" }
      - name: Test and vet
        shell: pwsh
        run: |
          go test ./...
          go vet ./...
      - name: Build and execute
        shell: pwsh
        run: |
          go build -trimpath -o jkv-ci.exe ./cmd/jkv
          & .\jkv-ci.exe version
      - name: Run PowerShell installer
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP 'jkv-install'
          & .\install.ps1 -InstallDir $installDir
          & (Join-Path $installDir 'bin\jkv.exe') version
          if (-not (Select-String -Path $PROFILE -SimpleMatch '# jkv init' -Quiet)) {
            throw 'PowerShell profile missing jkv init hook'
          }
